<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <!-- Background -->
  <rect width="800" height="420" fill="#f5f5f7" rx="16"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1d1d1f">Spark iOS — Architecture</text>

  <!-- SwiftUI Views box -->
  <rect x="40" y="70" width="200" height="260" rx="12" fill="white" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="140" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#1d1d1f">SwiftUI Views</text>

  <rect x="60" y="114" width="160" height="34" rx="8" fill="#f0f7ff" stroke="#0071e3" stroke-width="1"/>
  <text x="140" y="136" text-anchor="middle" font-size="12" fill="#0071e3">FeedView</text>

  <rect x="60" y="156" width="160" height="34" rx="8" fill="#f0f7ff" stroke="#0071e3" stroke-width="1"/>
  <text x="140" y="178" text-anchor="middle" font-size="12" fill="#0071e3">CreateView</text>

  <rect x="60" y="198" width="160" height="34" rx="8" fill="#f0f7ff" stroke="#0071e3" stroke-width="1"/>
  <text x="140" y="220" text-anchor="middle" font-size="12" fill="#0071e3">ProfileView</text>

  <rect x="60" y="240" width="160" height="34" rx="8" fill="#f0f7ff" stroke="#0071e3" stroke-width="1"/>
  <text x="140" y="262" text-anchor="middle" font-size="12" fill="#0071e3">AuthSheet</text>

  <rect x="60" y="282" width="160" height="34" rx="8" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
  <text x="140" y="304" text-anchor="middle" font-size="12" fill="#6e6e73">ContentView / TabView</text>

  <!-- AppState box -->
  <rect x="300" y="120" width="200" height="160" rx="12" fill="white" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="400" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#1d1d1f">AppState</text>
  <text x="400" y="172" text-anchor="middle" font-size="11" fill="#6e6e73">@Observable</text>

  <rect x="318" y="184" width="164" height="26" rx="6" fill="#f0f7ff" stroke="#0071e3" stroke-width="1"/>
  <text x="400" y="201" text-anchor="middle" font-size="11" fill="#0071e3">user: AuthResponse?</text>

  <rect x="318" y="216" width="164" height="26" rx="6" fill="#f0f7ff" stroke="#0071e3" stroke-width="1"/>
  <text x="400" y="233" text-anchor="middle" font-size="11" fill="#0071e3">posts: [Post]</text>

  <rect x="318" y="248" width="164" height="26" rx="6" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
  <text x="400" y="265" text-anchor="middle" font-size="11" fill="#6e6e73">login / logout / vote</text>

  <!-- SparkAPI box -->
  <rect x="560" y="70" width="200" height="180" rx="12" fill="white" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="660" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#1d1d1f">SparkAPI</text>
  <text x="660" y="118" text-anchor="middle" font-size="11" fill="#6e6e73">URLSession singleton</text>

  <rect x="578" y="130" width="164" height="22" rx="6" fill="#f0f7ff" stroke="#0071e3" stroke-width="1"/>
  <text x="660" y="145" text-anchor="middle" font-size="11" fill="#0071e3">POST /api/auth/login</text>

  <rect x="578" y="158" width="164" height="22" rx="6" fill="#f0f7ff" stroke="#0071e3" stroke-width="1"/>
  <text x="660" y="173" text-anchor="middle" font-size="11" fill="#0071e3">GET /api/posts</text>

  <rect x="578" y="186" width="164" height="22" rx="6" fill="#f0f7ff" stroke="#0071e3" stroke-width="1"/>
  <text x="660" y="201" text-anchor="middle" font-size="11" fill="#0071e3">POST /api/posts</text>

  <rect x="578" y="214" width="164" height="22" rx="6" fill="#f0f7ff" stroke="#0071e3" stroke-width="1"/>
  <text x="660" y="229" text-anchor="middle" font-size="11" fill="#0071e3">POST /api/posts/:id/vote</text>

  <!-- Keychain box -->
  <rect x="560" y="280" width="200" height="70" rx="12" fill="white" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="660" y="306" text-anchor="middle" font-size="13" font-weight="600" fill="#1d1d1f">KeychainHelper</text>
  <text x="660" y="326" text-anchor="middle" font-size="11" fill="#6e6e73">JWT token + user cache</text>
  <text x="660" y="342" text-anchor="middle" font-size="11" fill="#6e6e73">Security.framework</text>

  <!-- Vercel box -->
  <rect x="280" y="370" width="240" height="38" rx="10" fill="#1d1d1f"/>
  <text x="400" y="394" text-anchor="middle" font-size="13" font-weight="600" fill="white">spark.heyitsmejosh.com</text>

  <!-- Arrows: Views -> AppState -->
  <line x1="240" y1="200" x2="298" y2="200" stroke="#0071e3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="269" y="194" text-anchor="middle" font-size="10" fill="#0071e3">@Env</text>

  <!-- Arrows: AppState -> SparkAPI -->
  <line x1="500" y1="180" x2="558" y2="160" stroke="#0071e3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="529" y="163" text-anchor="middle" font-size="10" fill="#0071e3">async/await</text>

  <!-- Arrows: SparkAPI -> Vercel -->
  <line x1="660" y1="252" x2="660" y2="340" stroke="#6e6e73" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="660" y1="340" x2="500" y2="370" stroke="#6e6e73" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

  <!-- Arrows: SparkAPI -> Keychain -->
  <line x1="660" y1="252" x2="660" y2="278" stroke="#0071e3" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0071e3"/>
    </marker>
  </defs>
</svg>
